<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CropPrice AI | Functional Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-result { display: none; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 pb-10">

    <header class="bg-green-700 text-white p-6 shadow-lg text-center">
        <h1 class="text-2xl font-extrabold tracking-tight">🌾 CropPrice AI</h1>
        <p class="text-sm opacity-80 mt-1">Smart Decision Support for Farmers</p>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-6">

        <section class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
            <h2 class="text-lg font-bold mb-4 text-green-800 border-b pb-2">Enter Details</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Crop Type</label>
                    <select id="cropType" class="w-full mt-1 p-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                        <option value="Wheat">Wheat</option>
                        <option value="Rice">Rice</option>
                        <option value="Corn">Corn</option>
                        <option value="Tomato">Tomato</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Location</label>
                    <input type="text" id="location" placeholder="e.g. Punjab, MH" class="w-full mt-1 p-3 bg-gray-50 border border-gray-300 rounded-xl outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Your Expected Price (₹)</label>
                    <input type="number" id="expectedPrice" placeholder="Price per Quintal" class="w-full mt-1 p-3 bg-gray-50 border border-gray-300 rounded-xl outline-none">
                </div>
                <div class="flex items-end">
                    <button onclick="analyzeData()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95">
                        Analyze Best Deals
                    </button>
                </div>
            </div>
        </section>

        <div id="resultsArea" class="hidden-result space-y-4 animate-in fade-in duration-500">
            
            <div id="expectationFeedback" class="p-4 rounded-xl border-l-8">
                </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-blue-100">
                <h3 class="text-blue-800 font-bold text-sm uppercase tracking-wider">AI Fair Market Range</h3>
                <p id="fairRange" class="text-3xl font-black text-gray-800 mt-1"></p>
                <p class="text-xs text-gray-500 mt-2 leading-relaxed">This range is calculated based on historical Mandi trends and 12 active buyer quotes in your region.</p>
            </div>

            <h3 class="text-lg font-bold pt-4">Available Buyer Options</h3>
            <div id="buyerList" class="space-y-3">
                </div>

            <div class="bg-gray-800 text-white p-5 rounded-2xl">
                <h4 class="font-bold text-green-400">AI Logic: Why this is the best?</h4>
                <p id="aiJustification" class="text-sm mt-2 opacity-90"></p>
            </div>
        </div>

    </main>

    <script>
        // Mock Data: Real-world apps would fetch this from a database/API
        const marketData = {
            "Wheat": { basePrice: 2100, trend: "Rising" },
            "Rice": { basePrice: 1900, trend: "Stable" },
            "Corn": { basePrice: 1700, trend: "Falling" },
            "Tomato": { basePrice: 1200, trend: "Volatile" }
        };

        const buyers = [
            { name: "Govt. Mandi", distance: 12, reliability: 4.9, margin: 1.02 },
            { name: "Reliance Retail", distance: 5, reliability: 4.5, margin: 1.08 },
            { name: "Local Agent (Ram)", distance: 2, reliability: 2.5, margin: 0.85 },
            { name: "Organic Exports Co.", distance: 25, reliability: 4.0, margin: 1.15 }
        ];

        function analyzeData() {
            const crop = document.getElementById('cropType').value;
            const expected = parseFloat(document.getElementById('expectedPrice').value);
            
            if (!expected) { alert("Please enter your expected price"); return; }

            // 1. Calculate Fair Range
            const base = marketData[crop].basePrice;
            const lowRange = base - 50;
            const highRange = base + 150;
            document.getElementById('fairRange').innerText = `₹${lowRange} - ₹${highRange}`;

            // 2. Expectation Analysis
            const feedbackBox = document.getElementById('expectationFeedback');
            if (expected > highRange) {
                feedbackBox.className = "p-4 rounded-xl border-l-8 bg-yellow-50 border-yellow-500 text-yellow-800";
                feedbackBox.innerHTML = `<strong>Expectation: High</strong><br>Your price is ₹${expected - highRange} above market peak. It might be hard to find buyers.`;
            } else if (expected < lowRange) {
                feedbackBox.className = "p-4 rounded-xl border-l-8 bg-blue-50 border-blue-500 text-blue-800";
                feedbackBox.innerHTML = `<strong>Expectation: Low</strong><br>You are under-selling! The market is paying better than your expectation.`;
            } else {
                feedbackBox.className = "p-4 rounded-xl border-l-8 bg-green-50 border-green-500 text-green-800";
                feedbackBox.innerHTML = `<strong>Expectation: Reasonable</strong><br>Your price aligns perfectly with current market trends.`;
            }

            // 3. Process Buyers & Rank them
            const buyerContainer = document.getElementById('buyerList');
            buyerContainer.innerHTML = ''; // Clear previous

            const processedBuyers = buyers.map(b => ({
                ...b,
                offeredPrice: Math.round(base * b.margin)
            })).sort((a, b) => b.offeredPrice - a.offeredPrice);

            processedBuyers.forEach((b, index) => {
                const isUnfair = b.offeredPrice < lowRange;
                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border flex justify-between items-center ${index === 0 ? 'bg-green-50 border-green-200' : 'bg-white border-gray-100'} ${isUnfair ? 'bg-red-50 opacity-75' : ''}`;
                
                card.innerHTML = `
                    <div>
                        <p class="font-bold text-gray-800">${b.name} ${index === 0 ? '⭐' : ''}</p>
                        <p class="text-xs text-gray-500">${b.distance}km away • ${b.reliability} Rating</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-lg ${isUnfair ? 'text-red-600' : 'text-gray-800'}">₹${b.offeredPrice}</p>
                        ${index === 0 ? '<span class="text-[10px] bg-green-600 text-white px-2 py-0.5 rounded-full uppercase">Best Deal</span>' : ''}
                        ${isUnfair ? '<span class="text-[10px] bg-red-600 text-white px-2 py-0.5 rounded-full uppercase">Low Offer</span>' : ''}
                    </div>
                `;
                buyerContainer.appendChild(card);
            });

            // 4. AI Justification
            const best = processedBuyers[0];
            document.getElementById('aiJustification').innerText = 
                `We recommend ${best.name}. Even though it is ${best.distance}km away, the offered price of ₹${best.offeredPrice} is the highest available and fits within the "Fair Market Range." We flagged ${processedBuyers[3].name} because their offer is significantly below the current Mandi average for ${crop}.`;

            // Show results
            document.getElementById('resultsArea').classList.remove('hidden-result');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
